services:
  postgres:
    image: postgres:16-alpine
    container_name: project-database
    environment:
      - POSTGRES_DB:db
      - POSTGRES_USER:user
      - POSTGRES_PASSWORD:pass
    ports:
      - "5432:5432"
  
  backend:
    build:
      context: ./project-backend
    container_name: project-backend
    environment:
      - PORT:5000
      - DATABASE_URL:postgresql://postgres:567234@localhost:5432/rest_app
    ports:
      - "5000:5000"